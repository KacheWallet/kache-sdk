name: Publish to npm

# Publishes @kache/sdk when you push a version tag (e.g. `v1.0.0`).
# Typical release flow, run locally:
#   npm version 1.0.0     # bumps package.json + creates the v1.0.0 tag
#   git push --follow-tags # pushes the commit AND the tag → triggers this workflow
on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # required for npm provenance (OIDC)

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      # `prepublishOnly` in package.json runs typecheck → test → build before packing,
      # so the published dist is always fresh and verified.
      - name: Publish
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
